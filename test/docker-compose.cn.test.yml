# A-share (CN) E2E harness (CN-4a): app container (FINALLY_MARKET=cn) + Playwright.
# Mirrors docker-compose.test.yml but boots the A-share market profile and runs
# ONLY the CN specs (cn.spec.ts + pages-cn.spec.ts + strategies-cn.spec.ts +
# developers-cn.spec.ts + p4-cn.spec.ts).
# The US harness lives in docker-compose.test.yml and is unchanged.
#
# Run from the test/ directory:
#   docker compose -f docker-compose.cn.test.yml up --build --abort-on-container-exit --exit-code-from playwright
#
# The app runs with LLM_MOCK=true for fast, free, deterministic chat tests and
# WITHOUT a data volume, so every run starts from a fresh CN-seeded database.
services:
  app:
    build:
      context: ..
    environment:
      # Activate the A-share profile: ¥ / lot_size 100 / T+1 / 红涨绿跌 / 600519…
      FINALLY_MARKET: "cn"
      LLM_MOCK: "true"
      OPENROUTER_API_KEY: test-not-used
    # Tighter probe than the Dockerfile's 30s-interval HEALTHCHECK so the
    # playwright container starts as soon as the API is actually up.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  playwright:
    # Image tag MUST match the @playwright/test version pinned in package.json
    # (convention: mcr.microsoft.com/playwright:v<version>-<ubuntu codename>).
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    depends_on:
      app:
        condition: service_healthy
    working_dir: /tests
    volumes:
      - ./:/tests
    environment:
      BASE_URL: http://app:8000
      CI: "true"
      # Swaps playwright.config.ts to the dependency-free `cn` project so the CN
      # spec runs without the fresh-start US-seed assertions.
      CN_E2E: "1"
    # Recommended for Chromium stability in containers.
    ipc: host
    command: sh -c "npm ci && npx playwright test specs/cn.spec.ts specs/pages-cn.spec.ts specs/strategies-cn.spec.ts specs/developers-cn.spec.ts specs/p4-cn.spec.ts"
