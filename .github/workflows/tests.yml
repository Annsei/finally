name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run pytest
        run: uv run pytest

  frontend:
    name: Frontend (Jest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --watchAll=false

      - name: Build static export
        run: npm run build

  # E2E (Playwright) is intentionally NOT run in CI: it requires building the
  # full Docker image via docker compose, which is slow on hosted runners.
  # Run locally instead:
  #   cd test && docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
