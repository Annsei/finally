name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # E2E runs on demand and nightly (see e2e job below)
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run pytest
        run: uv run pytest

  frontend:
    name: Frontend (Jest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --watchAll=false

      - name: Build static export
        run: npm run build

  # E2E (Playwright) is too slow to gate every push, so it runs nightly and on
  # manual dispatch only. Run locally with:
  #   cd test && docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from playwright
  e2e:
    name: E2E (Playwright via docker compose)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E suite
        working-directory: test
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from playwright

      - name: Tear down
        if: always()
        working-directory: test
        run: docker compose -f docker-compose.test.yml down -v
